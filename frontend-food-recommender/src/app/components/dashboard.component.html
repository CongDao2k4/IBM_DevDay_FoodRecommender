<!-- Main Dashboard Container -->
<div class="h-screen flex flex-col bg-gray-50">
  
  <!-- Top Navbar -->
  <nav class="bg-gradient-to-r from-gray-800 via-gray-900 to-black shadow-lg">
    <div class="px-6 py-4">
      <div class="flex items-center justify-between">
        <!-- Logo and Title -->
        <div class="flex items-center space-x-3">
          <div class="text-4xl">🍎</div>
          <div>
            <h1 class="text-2xl font-bold text-white">Smart Health & Grocery Agent</h1>
            <p class="text-sm text-gray-300">AI-Powered Personalized Nutrition Assistant</p>
          </div>
        </div>

        <!-- User Info Badge and Edit Profile Button -->
        <div class="flex items-center space-x-4">
          <div class="px-4 py-2 bg-gray-700 rounded-lg">
            <div class="flex items-center space-x-2">
              <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
              </svg>
              <span class="text-sm text-gray-200">
                {{ currentProfile?.name || 'Guest User' }}
              </span>
            </div>
          </div>
          
          <!-- Edit Profile Button -->
          <button
            (click)="toggleProfile()"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition duration-200 flex items-center space-x-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
            <span>Edit Profile</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Success/Error Messages -->
  <div *ngIf="successMessage || errorMessage" class="relative">
    <!-- Success Message -->
    <div *ngIf="successMessage" 
         class="bg-green-50 border-l-4 border-green-500 px-6 py-3 flex items-center justify-between">
      <div class="flex items-center">
        <svg class="w-5 h-5 text-green-500 mr-3" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-green-800 font-medium">{{ successMessage }}</span>
      </div>
      <button (click)="clearMessages()" class="text-green-500 hover:text-green-700">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
      </button>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" 
         class="bg-red-50 border-l-4 border-red-500 px-6 py-3 flex items-center justify-between">
      <div class="flex items-center">
        <svg class="w-5 h-5 text-red-500 mr-3" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-red-800 font-medium">{{ errorMessage }}</span>
      </div>
      <button (click)="clearMessages()" class="text-red-500 hover:text-red-700">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex overflow-hidden relative">
    
    <!-- Slide-out Profile Panel Overlay -->
    <aside
      class="fixed inset-y-0 left-0 w-full md:w-[500px] bg-white shadow-2xl transform transition-transform duration-300 ease-in-out z-50 overflow-y-auto"
      [class.translate-x-0]="isProfileVisible"
      [class.-translate-x-full]="!isProfileVisible">
      
      <div class="h-full flex flex-col">
        <!-- Profile Panel Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4 flex items-center justify-between">
          <div class="flex items-center space-x-3">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <div>
              <h2 class="text-xl font-bold text-white">Your Health Profile</h2>
              <p class="text-sm text-blue-100">Manage your health information</p>
            </div>
          </div>
          
          <!-- Close Button -->
          <button
            (click)="toggleProfile()"
            class="p-2 hover:bg-blue-800 rounded-lg transition duration-200">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <!-- Loading State -->
        <div *ngIf="isLoadingProfile" class="flex-1 flex items-center justify-center py-8">
          <div class="flex flex-col items-center">
            <svg class="animate-spin h-10 w-10 text-blue-600 mb-3" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm text-gray-600">Saving profile...</p>
          </div>
        </div>

        <!-- User Profile Component -->
        <div *ngIf="!isLoadingProfile" class="flex-1 overflow-y-auto">
          <app-user-profile
            [profile]="currentProfile"
            (profileSaved)="onProfileSaved($event)">
          </app-user-profile>
        </div>
      </div>
    </aside>

    <!-- Backdrop Overlay (when profile is visible) -->
    <div
      *ngIf="isProfileVisible"
      (click)="toggleProfile()"
      class="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300">
    </div>

    <!-- Main Area: Agent Workspace (Full Width) -->
    <main class="flex-1 overflow-hidden bg-gray-50 w-full">
      <app-agent-workspace
        [userId]="currentUserId">
      </app-agent-workspace>
    </main>

  </div>
</div>
